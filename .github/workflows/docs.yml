name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: msu-256
      - uses: actions/checkout@v4
        with:
          repository: MavenRain/hdl-cat
          path: hdl-cat
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps --all-features
        working-directory: msu-256
      - run: echo '<meta http-equiv="refresh" content="0; url=msu_256/index.html">' > msu-256/target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: msu-256/target/doc
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
